# PostgreSQL 配置文件
# 使用方式：spring-boot --spring.profiles.active=postgresql
# 或设置环境变量 SPRING_PROFILES_ACTIVE=postgresql
#
# PostgreSQL 数据库信息：
# - Host: localhost
# - Port: 5432
# - Database: spring-ai-skills-demo
# - User: postgres
# - Password: 123456
# - 扩展: vector (pgvector), pg_jieba

spring:
  # 取消排除 PgVectorStore 自动配置（覆盖 application.yml 中的设置）
  autoconfigure:
    exclude: []

  # PostgreSQL 数据源配置（覆盖 application.yml 中的 H2 配置）
  datasource:
    url: jdbc:postgresql://localhost:5432/spring-ai-skills-demo
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: 123456

  # 禁用 H2 控制台（PostgreSQL 不需要）
  h2:
    console:
      enabled: false

  # Spring AI 配置 - 使用 PostgreSQL
  ai:
    # PgVectorStore 配置
    vectorstore:
      pgvector:
        enabled: true
        table-name: vector_store
        distance-type: COSINE_DISTANCE
        index-type: HNSW
        dimensions: 1024
        initialize-schema: true
    # Chat Memory JDBC 配置 - 使用 PostgreSQL
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
            platform: postgresql

# 日志配置
logging:
  level:
    com.example.demo: DEBUG
    org.springframework.ai: DEBUG
    org.springframework.jdbc: DEBUG
