spring:
  application:
    name: spring-ai-skills-demo
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-4o}
          temperature: 0.7

logging:
  level:
    org.springframework.web.client: DEBUG
    okhttp3: DEBUG
