spring:
  application:
    name: spring-ai-skills-demo

  # H2 文件型数据库（数据持久化到 ./data/chat-memory.mv.db）
  datasource:
    url: jdbc:h2:file:./data/chat-memory;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 控制台（调试用）
  h2:
    console:
      enabled: true
      path: /h2-console

  # Spring AI 配置
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        enabled: true
        options:
          model: ${OPENAI_MODEL:gpt-4o}
          temperature: 0.7
    # Chat Memory JDBC 配置
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
            platform: h2
    retry:
      max-attempts: 5
      initial-interval: 3000
      multiplier: 2

app:
  api:
    base-url: http://localhost:${server.port:8080}
  confirm-before-mutate: true

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true

logging:
  level:
    com.example.demo: DEBUG
    org.springframework.ai: DEBUG
