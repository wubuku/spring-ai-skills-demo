spring:
  application:
    name: spring-ai-skills-demo

  # 默认使用 PostgreSQL（与 .env 中的 SPRING_DATASOURCE_URL 一致）
  profiles:
    active: postgresql

  # 允许 Bean 定义覆盖（解决自定义配置与自动配置冲突）
  main:
    allow-bean-definition-overriding: true

  # 默认排除 PgVectorStore 自动配置（当 postgresql profile 激活时会启用）
  autoconfigure:
    exclude:
      - org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB

  # Spring AI 配置
  ai:
    # 开启 Spring AI 日志，打印最终发送给模型的 Prompt
    # 注意：chat.observations 不能和 openai.chat 同时存在，需要分开配置
    # LLM Provider 开关：openai 或 anthropic
    provider: ${app.llm.provider:openai}
    openai:
      api-key: ${OPENAI_API_KEY:dummy}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        # 禁用 Spring AI 自动配置！让 OkHttp 配置生效！
        enabled: false
        options:
          model: ${OPENAI_MODEL:gpt-4o}
          temperature: 0.7
    # Anthropic 配置（用于切换到 Anthropic API 兼容模型）
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:dummy}
      base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
      chat:
        enabled: false
        options:
          model: ${ANTHROPIC_MODEL:claude-3-5-sonnet-20241022}
          temperature: 0.7
          max-tokens: 4096
    # MiniMax 配置（原生 MiniMax 模型支持）
    minimax:
      api-key: ${SPRING_AI_MINIMAX_API_KEY:dummy}
      base-url: ${SPRING_AI_MINIMAX_BASE_URL:https://api.minimax.chat}
      chat:
        enabled: false
        options:
          model: ${SPRING_AI_MINIMAX_CHAT_OPTIONS_MODEL:abab6.5g-chat}
          temperature: 0.7
    # Chat Memory JDBC 配置
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
            platform: h2
      # Observations 配置 - 用于打印 prompt 和 completion
      observations:
        enabled: true
        log-prompt: true
        log-completion: true
    retry:
      max-attempts: 5
      initial-interval: 3000
      multiplier: 2

  # H2 文件型数据库（数据持久化到 ./data/chat-memory.mv.db）
  datasource:
    url: jdbc:h2:file:./data/chat-memory;DB_CLOSE_ON_EXIT=FALSE;DB_CLOSE_DELAY=-1;AUTO_RECONNECT=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 控制台（调试用）
  h2:
    console:
      enabled: true
      path: /h2-console

# SiliconFlow 嵌入模型配置（用于 VectorStoreChatMemoryAdvisor）
siliconflow:
  api-key: ${SILICONFLOW_API_KEY:}
  base-url: ${SILICONFLOW_URL:https://api.siliconflow.cn/v1}
  model: ${SILICONFLOW_MODEL:BAAI/bge-m3}
  dimensions: ${SILICONFLOW_DIMENSIONS:1024}

# 确保 observation 开启
management:
  observations:
    enabled: true
  tracing:
    sampling:
      probability: 1.0

app:
  # LLM Provider 开关：openai 或 anthropic
  llm:
    provider: ${LLM_PROVIDER:openai}
  api:
    base-url: http://localhost:${server.port:8080}

# 视觉模型配置（火山方舟/豆包视觉）
vision:
  base-url: ${VISION_BASE_URL:}
  api-key: ${VISION_API_KEY:}
  model: ${VISION_MODEL:}

# 语音转写配置（智谱 GLM-ASR）
transcription:
  base-url: ${TRANSCRIPTION_BASE_URL:}
  api-key: ${TRANSCRIPTION_API_KEY:}
  model: ${TRANSCRIPTION_MODEL:}

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true

logging:
  level:
    com.example.demo: DEBUG
    org.springframework.ai: DEBUG
    org.springframework.ai.chat.client.observation: DEBUG
    org.springframework.ai.chat.client.ChatClient: DEBUG
    org.springframework.ai.chat.observation: DEBUG
    org.springframework.ai.model.chat.observation: DEBUG
