<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 购物助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            width: 90%;
            max-width: 800px;
            height: 80vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }
        .header {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px 20px 0 0;
        }
        .header h1 { font-size: 24px; font-weight: 600; }
        .header p { font-size: 14px; opacity: 0.9; margin-top: 5px; }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .message.user {
            background: #667eea;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            background: #f0f0f0;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .input-area {
            padding: 20px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }
        #userInput {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }
        #userInput:focus { border-color: #667eea; }
        #sendBtn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        #sendBtn:hover { transform: scale(1.05); }
        #sendBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #667eea;
            animation: loading 1.4s infinite;
        }
        @keyframes loading {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        .confirm-buttons {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }
        .confirm-btn, .cancel-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 15px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .confirm-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .cancel-btn {
            background: #e0e0e0;
            color: #666;
        }
        .confirm-btn:hover, .cancel-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛍️ AI 购物助手</h1>
            <p>告诉我你想买什么，我会帮你搜索并加入购物车</p>
        </div>
        <div class="messages" id="messages">
            <div class="message assistant">
                你好！我是你的智能购物助手。你可以：<br>
                • 搜索商品：比如"找一款3000元以内的耳机"<br>
                • 查看详情：比如"第一个商品的详细信息"<br>
                • 加入购物车：比如"把第二个加入购物车"<br>
                • 结算订单：比如"帮我结算"
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="输入你的需求..."
                   onkeypress="if(event.key==='Enter') sendMessage()">
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const sendBtn = document.getElementById('sendBtn');
            const messages = document.getElementById('messages');
            const userMessage = input.value.trim();

            if (!userMessage) return;

            // 显示用户消息
            appendMessage('user', userMessage);
            input.value = '';
            sendBtn.disabled = true;

            // 显示加载中
            const loadingDiv = appendMessage('assistant', '<span class="loading"></span> 正在思考...');

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ content: userMessage })
                });
                const data = await response.json();
                messages.removeChild(loadingDiv);

                // 检测是否包含需要用户确认的操作
                const confirmAction = parseConfirmAction(data.response);
                if (confirmAction) {
                    showConfirmAction(confirmAction);
                } else {
                    appendMessage('assistant', data.response);
                }
            } catch (error) {
                messages.removeChild(loadingDiv);
                appendMessage('assistant', '抱歉，服务出错了：' + error.message);
            } finally {
                sendBtn.disabled = false;
                input.focus();
            }
        }

        function appendMessage(role, content) {
            const messages = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.innerHTML = content;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
            return div;
        }

        /** 检测响应中是否包含 ```http-request 代码块，提取描述和请求元数据 */
        function parseConfirmAction(text) {
            const regex = /```http-request\s*\n([\s\S]*?)\n\s*```/;
            const match = text.match(regex);
            if (!match) return null;
            try {
                const description = text.substring(0, match.index).trim();
                const requestMeta = JSON.parse(match[1].trim());
                return { description, requestMeta };
            } catch (e) {
                return null;
            }
        }

        /** 前端版 httpRequest —— 根据元数据构造并发送 HTTP 请求 */
        async function executeHttpRequest(meta) {
            let url = meta.url;
            if (meta.params) {
                const sp = new URLSearchParams(meta.params);
                url += '?' + sp.toString();
            }
            const opts = {
                method: meta.method,
                headers: { 'Content-Type': 'application/json' }
            };
            if (meta.body) {
                opts.body = JSON.stringify(meta.body);
            }
            const resp = await fetch(url, opts);
            return await resp.text();
        }

        /** 展示确认操作：说明文本 + 确定/取消按钮 */
        function showConfirmAction(action) {
            const messages = document.getElementById('messages');
            const descHtml = action.description.replace(/\n/g, '<br>');
            const msgDiv = appendMessage('assistant', descHtml);

            const btnContainer = document.createElement('div');
            btnContainer.className = 'confirm-buttons';

            const confirmBtn = document.createElement('button');
            confirmBtn.textContent = '确定';
            confirmBtn.className = 'confirm-btn';
            confirmBtn.onclick = async () => {
                btnContainer.remove();
                const loading = appendMessage('assistant',
                    '<span class="loading"></span> 正在执行...');
                try {
                    const result = await executeHttpRequest(action.requestMeta);
                    messages.removeChild(loading);
                    appendMessage('assistant', '✅ 操作结果：' + result);
                } catch (e) {
                    messages.removeChild(loading);
                    appendMessage('assistant', '❌ 操作失败：' + e.message);
                }
            };

            const cancelBtn = document.createElement('button');
            cancelBtn.textContent = '取消';
            cancelBtn.className = 'cancel-btn';
            cancelBtn.onclick = () => {
                btnContainer.remove();
                appendMessage('assistant', '已取消该操作。');
            };

            btnContainer.appendChild(confirmBtn);
            btnContainer.appendChild(cancelBtn);
            msgDiv.appendChild(btnContainer);
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
